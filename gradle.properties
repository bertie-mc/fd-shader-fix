mod_description=Makes fdlib's post-shader initialization resilient: if a post-shader chain fails to load during a resource reload (an intermittent race that crashes with 'Failed to load shaders'), it is logged and skipped instead of crashing the game. Fixes the intermittent boot crash from qliphoth-awakening, cinematic-cataclysm and other fdlib-based mods.
